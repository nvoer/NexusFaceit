<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Amble Faceit</title>
    <link rel="stylesheet" href="style.css">
    <link rel="icon" href="icons/iconka.png" type="image/png">
</head>

<body>
    <svg style="display: none;">
        <symbol id="icon-news" viewBox="0 0 24 24">
            <path d="M20 5h-9.586L8.707 3.293A.997.997 0 0 0 8 3H4c-1.103 0-2 .897-2 2v14c0 1.103.897 2 2 2h16c1.103 0 2-.897 2-2V7c0-1.103-.897-2-2-2zM4 19V7h16.001l.001 12H4zM6 9h12v2H6zm0 4h12v2H6zm0 4h6v2H6z"/>
        </symbol>
        <symbol id="icon-home" viewBox="0 0 24 24">
            <path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/>
        </symbol>
        <symbol id="icon-matches" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <polyline points="14.5 17.5 3 6 3 3 6 3 17.5 14.5"></polyline>
            <line x1="13" x2="19" y1="19" y2="13"></line>
            <line x1="16" x2="20" y1="16" y2="20"></line>
            <line x1="19" x2="21" y1="21" y2="19"></line>
            <polyline points="14.5 6.5 18 3 21 3 21 6 17.5 9.5"></polyline>
            <line x1="5" x2="9" y1="14" y2="18"></line>
            <line x1="7" x2="4" y1="17" y2="20"></line>
            <line x1="3" x2="5" y1="19" y2="21"></line>
        </symbol>
        <symbol id="icon-leaders" viewBox="0 0 24 24">
            <path d="M16 11c1.66 0 2.99-1.34 2.99-3S17.66 5 16 5s-3 1.34-3 3 1.34 3 3 3zM8 11c1.66 0 2.99-1.34 2.99-3S9.66 5 8 5 5 6.34 5 8s1.34 3 3 3zm0 2c-2.33 0-7 1.17-7 3.5V19h14v-2.5C15 14.17 10.33 13 8 13zm8 0c-.29 0-.62.02-.97.05 1.16.84 1.97 1.98 1.97 3.45V19h6v-2.5c0-2.33-4.67-3.5-7-3.5z"/>
        </symbol>
        <symbol id="icon-rules" viewBox="0 0 24 24">
            <path d="M12 1L3 5v6c0 5.55 3.84 10.74 9 12 5.16-1.26 9-6.45 9-12V5l-9-4zm0 10.99h7c-.53 4.12-3.28 7.79-7 8.94V12H5V6.3l7-3.11v8.8z"/>
        </symbol>
        <symbol id="icon-ban" viewBox="0 0 24 24">
            <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm0 18c-4.42 0-8-3.58-8-8 0-1.85.63-3.55 1.69-4.9L16.9 18.31C15.55 19.37 13.85 20 12 20zm4.31-3.1L5.69 5.69A7.92 7.92 0 0 1 12 4c4.42 0 8 3.58 8 8 0 1.85-.63 3.55-1.69 4.9z"/>
        </symbol>
        <symbol id="icon-support" viewBox="0 0 24 24">
            <path d="M12 2c-4.97 0-9 4.03-9 9v7c0 1.66 1.34 3 3 3h3v-8H5v-2c0-3.87 3.13-7 7-7s7 3.13 7 7v2h-4v8h3c1.66 0 3-1.34 3-3v-7c0-4.97-4.03-9-9-9z"/>
        </symbol>
    </svg>
    
    <header class="mobile-header">
        <div class="burger-icon" id="burgerBtn">
            <span></span>
            <span></span>
            <span></span>
        </div>
    </header>
    
    <aside class="sidebar" id="sidebar">
        
        <div class="logo-area">
            <div class="logo-main">
                <div class="logo-group white">
                    <span class="bold-letter">A</span>
                    <span class="expanding-text">mble</span>
                </div>
                <div class="logo-group orange">
                    <span class="bold-letter">F</span>
                    <span class="expanding-text">aceit</span>
                </div>
            </div>
        </div>
        
        <div class="full-line"></div>
        
        <div class="menu-item" data-tab="main">
            <div class="icon"><svg><use href="#icon-home"></use></svg></div>
            <span class="text">Главная</span>
        </div>
        <div class="menu-item" data-tab="news">
            <div class="icon"><svg><use href="#icon-news"></use></svg></div>
            <span class="text">Новости </span>
        </div>
        <div class="menu-item" data-tab="matches">
            <div class="icon"><svg><use href="#icon-matches"></use></svg></div>
            <span class="text">Матчи</span>
        </div>
        <div class="menu-item" data-tab="leaders">
            <div class="icon"><svg><use href="#icon-leaders"></use></svg></div>
            <span class="text">Лидеры</span>
        </div>
        <div class="menu-item" data-tab="rules">
            <div class="icon"><svg><use href="#icon-rules"></use></svg></div>
            <span class="text">Правила</span>
        </div>
        <div class="menu-item" data-tab="banlist">
            <div class="icon"><svg><use href="#icon-ban"></use></svg></div>
            <span class="text">Бан лист</span>
        </div>
        <div class="menu-item" data-tab="support">
            <div class="icon"><svg><use href="#icon-support"></use></svg></div>
            <span class="text">Поддержка</span>
        </div>
    </aside>
    
    <main class="main-content">
        <div class="full-line"></div>
        
        <section id="news" class="tab-content active">
            <h1 class="content-title">Последние новости</h1>
        </section>
        <section id="main" class="tab-content">
            <h1 class="content-title">Главная страница</h1>
        </section>
        <section id="matches" class="tab-content">
            <h1 class="content-title">Матчи</h1>
        </section>
        <section id="leaders" class="tab-content">
            <h1 class="content-title">Лидеры</h1>
        </section>
        <section id="rules" class="tab-content">
            <h1 class="content-title">Правила</h1>
        </section>
        <section id="banlist" class="tab-content">
            <h1 class="content-title">Бан лист</h1>
        </section>
        <section id="support" class="tab-content">
            <h1 class="content-title">Поддержка</h1>
        </section>
    </main>
    
    <script src="script.js"></script>
</body>
</html>
